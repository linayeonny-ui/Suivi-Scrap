services:
  - type: web
    name: suivi-scrap-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python seed.py && gunicorn app:app --worker-tmp-dir /dev/shm --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
    disk:
      name: data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
